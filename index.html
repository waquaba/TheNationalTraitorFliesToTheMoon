<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空港分室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 全体のリセットと背景（清潔で眩しい空港のイメージ） */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Shippori Mincho', serif;
            background-color: #dceaf5; /* 眩しく清潔なライトブルー */
            /* 擬似的に空港のパースや光を表現するグラデーション */
            background: radial-gradient(circle at 50% 30%, #ffffff 0%, #edf5fa 50%, #c5daf0 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ----------------------------------
         * 天井から吊り下げられた3つのタブ（ずらさず横並び）
         * ---------------------------------- */
        .ceiling-nav {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px; /* タブ同士の間隔 */
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }

        /* 吊り下げている細いワイヤー */
        .nav-item::before {
            content: "";
            width: 1px;
            height: 60px; /* ワイヤーの長さ */
            background: linear-gradient(to bottom, #7a94a8, #b0c7d8);
        }

        /* 看板（タブ）本体：半透明で光を透過するアクリル風 */
        .nav-box {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 35px rgba(180, 200, 215, 0.4), 
                        inset 0 0 15px rgba(255, 255, 255, 0.6);
            padding: 25px 15px;
            width: 45px; /* 縦長の看板 */
            text-align: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        /* 看板の中の美しい縦書き日本語 */
        .nav-box span {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 1.3rem;
            font-weight: 700;
            color: #1c2d3d;
            letter-spacing: 0.3em;
        }

        /* ホバー（マウスを載せたとき）のチープで綺麗な光の反応 */
        .nav-item:hover .nav-box {
            background: rgba(255, 255, 255, 0.98);
            transform: translateY(4px); /* 少し自重で沈むような沈み込み */
            box-shadow: 0 5px 15px rgba(150, 180, 200, 0.3);
        }


        /* ----------------------------------
         * 右下：ベタ青・bit数を下げたテプラ風お問い合わせ
         * ---------------------------------- */
        .tepra-contact {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0000ff; /* 完全にベタのRGBの青(B) */
            border: 2px solid #0000ff;
            box-shadow: 2px 2px 0px #000; /* チープなオールドインターネット風の影 */
            padding: 12px 18px;
            text-decoration: none;
            z-index: 100;
            cursor: pointer;
            transition: transform 0.1s;
        }

        /* テプラ内の文字：白くてbit数を下げた（ドット絵風）質感 */
        .tepra-contact span {
            font-family: 'DotGothic16', sans-serif;
            color: #ffffff;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            font-weight: bold;
        }

        .tepra-contact:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0px #000;
        }

        .tepra-contact:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #000;
        }


        /* ----------------------------------
         * 中央：コンテンツ表示エリア
         * ---------------------------------- */
        .main-container {
            max-width: 650px;
            margin: 0 auto;
            padding-top: 260px; /* 吊り下げタブと被らないように余白 */
            padding-bottom: 100px;
        }

        /* 各セクションのスタイル（標準状態では非表示、対象だけが滑らかに出現） */
        section {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(220, 230, 240, 0.8);
            padding: 40px;
            margin-bottom: 40px;
            backdrop-filter: blur(2px);
            box-shadow: 0 10px 30px rgba(150, 170, 190, 0.1);
            display: none; /* 初期状態は非表示 */
        }

        /* アクティブなセクションだけを表示 */
        section:target, section.active {
            display: block;
            animation: fadeIn 0.6s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.4rem;
            color: #1c2d3d;
            border-bottom: 1px solid #1c2d3d;
            padding-bottom: 10px;
            margin-top: 0;
            letter-spacing: 0.15em;
        }

        p {
            color: #2c3e50;
            line-height: 2;
            font-size: 0.95rem;
        }

        /* リストやフォームの簡易装飾 */
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #b0c7d8; }
        a { color: #0000ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* お問い合わせフォーム内の要素 */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        input, textarea {
            width: 100%; padding: 10px; border: 1px solid #b0c7d8; 
            background: rgba(255,255,255,0.8); font-family: inherit; box-sizing: border-box;
        }
        .submit-btn {
            background: #1c2d3d; color: white; border: none; padding: 10px 20px; 
            font-family: inherit; cursor: pointer; letter-spacing: 0.1em;
        }
        .submit-btn:hover { background: #34495e; }
    </style>
</head>
<body>

    <nav class="ceiling-nav">
        <a class="nav-item" href="#profile" onclick="switchSection('profile')">
            <div class="nav-box"><span>自己紹介</span></div>
        </a>
        <a class="nav-item" href="#diary" onclick="switchSection('diary')">
            <div class="nav-box"><span>日記</span></div>
        </a>
        <a class="nav-item" href="#miscellany" onclick="switchSection('miscellany')">
            <div class="nav-box"><span>雑記帳</span></div>
        </a>
    </nav>

    <a class="tepra-contact" href="#contact" onclick="switchSection('contact')">
        <span>お問い合わせフォーム</span>
    </a>

    <div class="main-container">

        <section id="profile" class="active">
            <h2>自己紹介</h2>
            <p>
                ここに簡単な自己紹介を書いてください。現在の所属、関心のあるテーマ、あるいはこの静かな空間についての短いテキストを置く場所です。
            </p>
        </section>

        <section id="diary">
            <h2>日記</h2>
            <ul>
                <li>
                    <span style="font-size: 0.8rem; color: #7a94a8; display: block;">2026.06.29</span>
                    <a href="#">今日の日記（仮）</a>
                    <p style="margin: 5px 0 0 0; font-size: 0.9rem; color: #556b7d;">ここへ日記の文章が入ります。</p>
                </li>
            </ul>
        </section>

        <section id="miscellany">
            <h2>雑記帳</h2>
            <ul>
                <li><a href="#">思考の断片についてのノート</a></li>
                <li><a href="#">いつか整理するかもしれない概念</a></li>
            </ul>
        </section>

        <section id="contact">
            <h2>お問い合わせ</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">お名前</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">メッセージ</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">送信</button>
            </form>
        </section>

    </div>

    <script>
        function switchSection(sectionId) {
            // すべてのセクションから active クラスを取り除く
            const sections = document.querySelectorAll('main-container section, section');
            sections.forEach(sec => {
                sec.classList.remove('active');
            });
            // クリックされたセクションに active クラスを付与
            const activeSection = document.getElementById(sectionId);
            if (activeSection) {
                activeSection.classList.add('active');
            }
        }
        
        // ページ読み込み時にURLのハッシュ（#~）があれば自動切り替え
        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                switchSection(hash);
            }
        });
    </script>

</body>
</html>
